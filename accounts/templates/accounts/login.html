<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogicLabs — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #0a0a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(100,80,255,0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(100,80,255,0.07) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }
        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        .logo-area {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 68px; height: 68px;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            box-shadow: 0 0 30px rgba(79,70,229,0.5);
        }

        .logo-icon svg {
            width: 38px; height: 38px;
            fill: none;
            stroke: white;
            stroke-width: 2;
        }

        .logo-name {
            font-size: 28px;
            font-weight: 700;
        }
        .logo-name .logic { color: #ffffff; }
        .logo-name .labs  { color: #06b6d4; }

        .logo-tagline {
            font-size: 10px;
            letter-spacing: 4px;
            color: #6b7280;
            margin-top: 4px;
            text-transform: uppercase;
        }

        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: rgba(15,15,35,0.85);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 32px 36px 28px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 20px; right: 20px;
            height: 2px;
            background: linear-gradient(90deg, #7c3aed, #06b6d4, #ec4899);
            border-radius: 2px;
        }

        .role-toggle {
            display: flex;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 24px;
        }

        .role-btn {
            flex: 1;
            padding: 9px 0;
            border: none;
            background: transparent;
            color: #6b7280;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 9px;
            transition: all 0.25s;
        }

        .role-btn.active {
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            color: #fff;
            box-shadow: 0 4px 15px rgba(124,58,237,0.4);
        }

        .subtitle {
            font-size: 10px;
            letter-spacing: 3px;
            color: #7c3aed;
            text-align: center;
            margin-bottom: 4px;
            font-family: 'Courier New', monospace;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            text-align: center;
            margin-bottom: 22px;
        }

        .error-msg {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.3);
            color: #f87171;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
        }

        .input-group { margin-bottom: 16px; }

        .input-label {
            font-size: 11px;
            letter-spacing: 2px;
            color: #9ca3af;
            text-transform: uppercase;
            margin-bottom: 7px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-field {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 12px 14px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-field::placeholder { color: #4b5563; }

        .input-field:focus {
            border-color: rgba(124,58,237,0.6);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #ec4899, #7c3aed, #06b6d4);
            background-size: 200% 200%;
            animation: gradientShift 4s ease infinite;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 6px;
            transition: transform 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(124,58,237,0.45);
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bottom-link {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: #6b7280;
        }

        .bottom-link a {
            color: #06b6d4;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="logo-area">
    <div class="logo-icon">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="5"/>
            <path d="M3 21c0-4.418 4.03-8 9-8s9 3.582 9 8"/>
        </svg>
    </div>
    <div class="logo-name">
        <span class="logic">Logic</span><span class="labs">Labs</span>
    </div>
    <div class="logo-tagline">Code &bull; Think &bull; Solve &bull; Innovate</div>
</div>

<div class="card">
    <div class="role-toggle">
        <button class="role-btn" id="btn-recruiter"
                onclick="switchPanel('recruiter')" type="button">
            🏢 Recruiter
        </button>
        <button class="role-btn" id="btn-candidate"
                onclick="switchPanel('candidate')" type="button">
            👤 Candidate
        </button>
    </div>

    <div class="subtitle">// WELCOME BACK</div>
    <div class="card-title">Sign in to continue</div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/accounts/login/">
        {% csrf_token %}
        <input type="hidden" name="panel" id="panel-input" value="{{ panel }}">

        <div class="input-group">
            <div class="input-label">👤 Username</div>
            <input type="text" name="username" class="input-field"
                   placeholder="Enter your username" required>
        </div>

        <div class="input-group">
            <div class="input-label">🔒 Password</div>
            <input type="password" name="password" class="input-field"
                   placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-login">→ LOGIN</button>
    </form>

    <div id="candidate-footer" class="bottom-link" style="display:none;">
        No account? <a href="/accounts/register/">Sign Up Free</a>
    </div>

    <div id="recruiter-footer" class="bottom-link" style="display:none;">
        Recruiter access is restricted. Contact admin for credentials.
    </div>
</div>

<script>
    function switchPanel(panel) {
        document.getElementById('panel-input').value = panel;
        document.getElementById('btn-recruiter').classList.toggle('active', panel === 'recruiter');
        document.getElementById('btn-candidate').classList.toggle('active', panel === 'candidate');
        document.getElementById('candidate-footer').style.display = panel === 'candidate' ? 'block' : 'none';
        document.getElementById('recruiter-footer').style.display = panel === 'recruiter' ? 'block' : 'none';
    }
    switchPanel('{{ panel|default:"recruiter" }}');
</script>

</body>
</html>
