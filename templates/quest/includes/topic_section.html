<div class="card-glass p-4 topic-section-block" style="border-color:rgba({{ accent_rgb }},0.25);margin-bottom:18px;">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <div style="width:38px;height:38px;border-radius:10px;
        background:rgba({{ accent_rgb }},0.1);
        border:1px solid rgba({{ accent_rgb }},0.3);
        display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <i class="{{ section.icon }}" style="color:{{ accent }};font-size:0.85rem;"></i>
        </div>
        <div style="font-family:'Orbitron',monospace;font-size:0.92rem;font-weight:700;color:{{ accent }};">
            {{ section.title }}
        </div>
    </div>

    {% if section.content %}
<div class="topic-section-prose">
    {{ section.content|safe }}
</div>
{% else %}
    <div style="border:1px dashed rgba(240,234,255,0.15);border-radius:10px;
    padding:22px;text-align:center;
    color:rgba(240,234,255,0.35);
    font-family:'JetBrains Mono',monospace;
    font-size:0.78rem;">
        <i class="fas fa-hourglass-half" style="margin-right:8px;"></i>{{ section.title }} content coming soon.
    </div>
    {% endif %}
</div>
