<!-- AI Chatbot Floating Widget -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
  :root {
    --chat-accent: #b026ff;
    --chat-accent-glow: rgba(176, 38, 255, 0.45);
    --chat-border: rgba(176, 38, 255, 0.25);
    --chat-bg: rgba(10, 8, 22, 0.95);
    --msg-user-bg: linear-gradient(135deg, rgba(255, 45, 120, 0.15), rgba(176, 38, 255, 0.15));
    --msg-user-border: rgba(255, 45, 120, 0.3);
    --msg-ai-bg: rgba(255, 255, 255, 0.03);
    --msg-ai-border: rgba(0, 255, 247, 0.25);
  }

  /* --- Launcher Button --- */
  #chat-launcher {
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple), var(--neon-cyan));
    background-size: 200% 200%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 20px var(--chat-accent-glow), 0 5px 15px rgba(0, 0, 0, 0.5);
    cursor: pointer;
    z-index: 2000;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border: 2px solid rgba(255, 255, 255, 0.15);
    animation: launcher-float 3s ease-in-out infinite, launcher-glow 4s ease infinite;
  }

  #chat-launcher:hover {
    transform: scale(1.1) rotate(15deg);
    box-shadow: 0 0 30px var(--neon-cyan), 0 10px 25px rgba(0, 0, 0, 0.6);
  }

  .launcher-logo-img {
    width: calc(100% - 6px);
    height: calc(100% - 6px);
    object-fit: cover;
    border-radius: 50%;
    transition: transform 0.3s ease;
  }

  .header-logo-img {
    width: calc(100% - 4px);
    height: calc(100% - 4px);
    object-fit: cover;
    border-radius: 50%;
  }

  .action-svg {
    width: 18px;
    height: 18px;
    color: var(--text-dim);
    transition: all 0.2s ease;
  }

  .action-svg:hover {
    color: var(--neon-pink);
    filter: drop-shadow(0 0 5px var(--neon-pink));
    transform: scale(1.1);
  }

  .send-svg {
    width: 18px;
    height: 18px;
    color: currentColor;
  }

  /* Unread indicator pulse */
  #chat-badge {
    position: absolute;
    top: -2px;
    right: -2px;
    width: 14px;
    height: 14px;
    background-color: var(--neon-pink);
    border: 2px solid var(--bg-void);
    border-radius: 50%;
    display: none;
    box-shadow: 0 0 10px var(--neon-pink);
  }

  @keyframes launcher-float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  @keyframes launcher-glow {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* --- Chat Window --- */
  #chat-window {
    position: fixed;
    bottom: 95px;
    right: 25px;
    width: 400px;
    height: 600px;
    background: var(--chat-bg);
    border: 1px solid var(--chat-border);
    border-radius: 16px;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(176, 38, 255, 0.15);
    display: flex;
    flex-direction: column;
    z-index: 2000;
    overflow: hidden;
    backdrop-filter: blur(20px);
    transition: all 0.3s cubic-bezier(0.075, 0.82, 0.165, 1);
    transform: scale(0.8) translateY(50px);
    opacity: 0;
    pointer-events: none;
  }

  #chat-window.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: auto;
  }

  /* Top border gradient line */
  #chat-window::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
  }

  /* --- Chat Header --- */
  .chat-header {
    padding: 16px 20px;
    background: rgba(8, 5, 18, 0.85);
    border-bottom: 1px solid rgba(176, 38, 255, 0.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .chat-header-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .chat-avatar-glow {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(176, 38, 255, 0.1);
    border: 1px solid var(--neon-purple);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 10px rgba(176, 38, 255, 0.3);
    color: var(--neon-cyan);
    font-size: 1.1rem;
  }

  .chat-header-title {
    font-family: var(--font-display);
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #ffffff, var(--neon-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .chat-status {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.65rem;
    font-family: var(--font-code);
    color: rgba(255, 255, 255, 0.5);
  }

  .chat-status-dot {
    width: 6px;
    height: 6px;
    background-color: #00ff82;
    border-radius: 50%;
    box-shadow: 0 0 8px #00ff82;
    animation: status-pulse 2s infinite;
  }

  @keyframes status-pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .chat-header-actions button {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    padding: 4px 8px;
  }

  .chat-header-actions button:hover {
    color: var(--neon-pink);
    text-shadow: 0 0 10px var(--neon-pink);
  }

  /* --- Chat Body (Messages) --- */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
  }

  /* Message block layout */
  .chat-message {
    max-width: 85%;
    display: flex;
    flex-direction: column;
    animation: msg-slide 0.3s ease forwards;
  }

  @keyframes msg-slide {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .chat-message.user {
    align-self: flex-end;
  }

  .chat-message.model {
    align-self: flex-start;
  }

  /* Message Bubble */
  .chat-bubble {
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 0.85rem;
    line-height: 1.5;
    word-break: break-word;
  }

  .chat-message.user .chat-bubble {
    background: var(--msg-user-bg);
    border: 1px solid var(--msg-user-border);
    color: #ffffff;
    border-bottom-right-radius: 2px;
    box-shadow: 0 4px 15px rgba(255, 45, 120, 0.05);
  }

  .chat-message.model .chat-bubble {
    background: var(--msg-ai-bg);
    border: 1px solid var(--msg-ai-border);
    color: #e0e0ff;
    border-bottom-left-radius: 2px;
    box-shadow: 0 4px 15px rgba(0, 255, 247, 0.02);
  }

  .chat-time {
    font-size: 0.65rem;
    color: rgba(240, 234, 255, 0.3);
    margin-top: 4px;
    font-family: var(--font-code);
  }

  .chat-message.user .chat-time {
    align-self: flex-end;
  }

  .chat-message.model .chat-time {
    align-self: flex-start;
  }

  /* --- Quick Reply Suggestion Chips --- */
  .chat-suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 8px;
    padding: 0 10px;
  }

  .suggestion-chip {
    font-size: 0.72rem;
    background: rgba(176, 38, 255, 0.06);
    border: 1px solid rgba(176, 38, 255, 0.2);
    color: #d1c8ff;
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: var(--font-body);
  }

  .suggestion-chip:hover {
    background: rgba(0, 255, 247, 0.08);
    border-color: var(--neon-cyan);
    color: var(--neon-cyan);
    box-shadow: 0 0 10px rgba(0, 255, 247, 0.15);
  }

  /* --- Typing / Thinking Indicator --- */
  .chat-loader {
    align-self: flex-start;
    display: none;
    max-width: 85%;
  }

  .chat-loader-bubble {
    background: var(--msg-ai-bg);
    border: 1px solid rgba(0, 255, 247, 0.15);
    border-radius: 12px;
    border-bottom-left-radius: 2px;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 6px;

  .chat-loader-dot {
    width: 6px;
    height: 6px;
    background-color: var(--neon-cyan);
    border-radius: 50%;
    animation: loader-bounce 1.4s infinite ease-in-out both;
  }

  .chat-loader-dot:nth-child(1) { animation-delay: -0.32s; }
  .chat-loader-dot:nth-child(2) { animation-delay: -0.16s; }

  @keyframes loader-bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1.0); }
  }

  /* --- Chat Input Footer --- */
  .chat-footer {
    padding: 15px 20px 20px;
    background: rgba(8, 5, 18, 0.85);
    border-top: 1px solid rgba(176, 38, 255, 0.15);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .chat-input-wrap {
    display: flex;
    align-items: center;
    gap: 10px;

  }

  .chat-input-field {

  .chat-send-btn {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    background: rgba(0, 255, 247, 0.08);
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .chat-send-btn:hover {
    background: var(--neon-cyan);
    color: #000000;
    box-shadow: 0 0 15px rgba(0, 255, 247, 0.4);
    transform: translateY(-2px);
  }

  .chat-send-btn:disabled {
    background: rgba(255, 255, 255, 0.02) !important;
    border-color: rgba(255, 255, 255, 0.1) !important;
    color: rgba(255, 255, 255, 0.2) !important;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .chat-rate-notice {
    font-size: 0.62rem;
    color: rgba(240, 234, 255, 0.25);
    display: flex;
    justify-content: space-between;
    font-family: var(--font-code);
    padding: 0 2px;
  }

  /* --- Markdown Render Custom Styles --- */
  .chat-bubble p { margin-bottom: 10px; }
  .chat-bubble p:last-child { margin-bottom: 0; }
  
  .chat-bubble code {
    background: rgba(0, 255, 247, 0.08);
    color: var(--neon-cyan);
    padding: 2px 5px;
    border-radius: 4px;
    font-family: var(--font-code);
    font-size: 0.8rem;
  }

  .chat-bubble pre {
    background: rgba(5, 3, 10, 0.8) !important;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    padding: 12px;
    margin: 12px 0;
    overflow-x: auto;
    position: relative;
  }

  .chat-bubble pre code {
    background: none;
    color: #e0e0ff;
    padding: 0;
    font-size: 0.78rem;
    display: block;
    font-family: var(--font-code);
  }

  /* Markdown lists */
  .chat-bubble ul, .chat-bubble ol {
    padding-left: 20px;
    margin-bottom: 10px;
  }

  .chat-bubble li {
    margin-bottom: 4px;
  }

  /* Code block copy button styling */
  .code-copy-btn {
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 0.68rem;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: rgba(255, 255, 255, 0.6);
    padding: 2px 6px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--font-body);
  }

  .code-copy-btn:hover {
    background: rgba(0, 255, 247, 0.15);
    border-color: var(--neon-cyan);
    color: var(--neon-cyan);
  }

  /* --- Error bubble custom style --- */
  .chat-error-bubble {
    background: rgba(255, 45, 120, 0.08) !important;
    border: 1px solid rgba(255, 45, 120, 0.3) !important;

  /* Responsive styling */
  @media (max-width: 480px) {
    #chat-window {
      bottom: 0;
      right: 0;
      width: 100vw;

</style>

<!-- JS Logic for Chatbot -->
<script>
  const chatWindow = document.getElementById('chat-window');
  const messageList = document.getElementById('chat-message-list');
  const chatInput = document.getElementById('chat-input');
  const sendButton = document.getElementById('chat-send-button');
  const chatLoader = document.getElementById('chat-loader-widget');
  const unreadBadge = document.getElementById('chat-badge');
  const rateRemaining = document.getElementById('rate-remaining');
  const suggestBox = document.getElementById('chat-suggest-box');

  const CSRF_TOKEN = "{{ csrf_token }}";
  let chatSession = []; // Format: {role: 'user' | 'model', text: '...'}
  let isThinking = false;
  let hasOpened = false;

  // Load chat session on init
  window.addEventListener('DOMContentLoaded', () => {
    // Setup marked options for secure rendering
    if (typeof marked !== 'undefined') {
      marked.use({
        gfm: true,
        breaks: true,
      });
    }

    const savedHistory = sessionStorage.getItem('logiclabs_chat_session');
    if (savedHistory) {
      chatSession = JSON.parse(savedHistory);
      renderAllMessages();
    } else {
      // Add welcome message
      addSystemWelcome();
    }
  });

  function addSystemWelcome() {
    const welcomeText = "Hello! I am your **echo**. 🚀\n\nI can help you debug logic errors, explain algorithms, or teach programming concepts step-by-step. \n\n*Note: To help you learn, I will guide you with hints and advice rather than giving away complete answers directly!*";
    
    // Add to HTML list only (not session history to keep context clean)
    appendMessageHTML('model', welcomeText, false);
  }

  function toggleChatWindow() {
    chatWindow.classList.toggle('open');
    if (chatWindow.classList.contains('open')) {
      unreadBadge.style.display = 'none';
      chatInput.focus();
      if (!hasOpened) {
        hasOpened = true;
        scrollToBottom();
      }
    }
  }

  function autoGrow(element) {
    element.style.height = "5px";
    element.style.height = (element.scrollHeight) + "px";
  }

  function handleKeydown(event) {
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault();
      sendChatMessage();
    }
  }

  function clearChatHistory() {
    if (confirm("Are you sure you want to clear your chat history?")) {
      chatSession = [];
      sessionStorage.removeItem('logiclabs_chat_session');
      messageList.innerHTML = '';
      addSystemWelcome();
      suggestBox.style.display = 'flex';
      rateRemaining.textContent = 'Ready';
    }
  }

  function sendSuggestion(text) {
    chatInput.value = text;
    sendChatMessage();
  }

  function renderAllMessages() {
    messageList.innerHTML = '';
    
    // Add welcome
    addSystemWelcome();

    chatSession.forEach(msg => {
      appendMessageHTML(msg.role, msg.text, false);
    });

    if (chatSession.length > 0) {
      suggestBox.style.display = 'none';
    }
    scrollToBottom();
  }

  function appendMessageHTML(role, text, animate = true) {
    const messageContainer = document.createElement('div');
    messageContainer.classList.add('chat-message', role);
    if (!animate) {
      messageContainer.style.animation = 'none';
    }

    const bubble = document.createElement('div');
    bubble.classList.add('chat-bubble');

    // Parse Markdown for Model, plain text with newlines for User
    if (role === 'model' && typeof marked !== 'undefined') {
      bubble.innerHTML = marked.parse(text);
    } else {
      bubble.textContent = text;
      bubble.style.whiteSpace = 'pre-wrap';
    }

    const time = document.createElement('div');
    time.classList.add('chat-time');
    const now = new Date();
    time.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    messageContainer.appendChild(bubble);
    messageContainer.appendChild(time);
    messageList.appendChild(messageContainer);

    // Apply syntax highlighting
    if (role === 'model') {
      bubble.querySelectorAll('pre code').forEach((el) => {
        if (typeof hljs !== 'undefined') {
          hljs.highlightElement(el);
        }
        
        // Add Copy Button
        const pre = el.parentNode;
        pre.style.position = 'relative';
        const copyBtn = document.createElement('button');
        copyBtn.className = 'code-copy-btn';
        copyBtn.textContent = 'Copy';
        copyBtn.addEventListener('click', () => {
          navigator.clipboard.writeText(el.textContent).then(() => {
            copyBtn.textContent = 'Copied!';
            setTimeout(() => { copyBtn.textContent = 'Copy'; }, 2000);
          });
        });
        pre.appendChild(copyBtn);
      });
    }

    scrollToBottom();
  }

  function appendErrorHTML(errorMsg) {
    const messageContainer = document.createElement('div');
    messageContainer.classList.add('chat-message', 'model');
    
    const bubble = document.createElement('div');
    bubble.classList.add('chat-bubble', 'chat-error-bubble');
    
    const iconSpan = document.createElement('span');
    iconSpan.innerHTML = `<svg class="error-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 15px; height: 15px; margin-right: 8px; vertical-align: text-bottom; display: inline-block;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"></svg>`;
    bubble.appendChild(iconSpan.firstChild);
    
    const textNode = document.createTextNode(errorMsg);
    bubble.appendChild(textNode);
    
    const time = document.createElement('div');
    time.classList.add('chat-time');
    const now = new Date();
    time.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    
    messageContainer.appendChild(bubble);
    messageContainer.appendChild(time);
    messageList.appendChild(messageContainer);
    scrollToBottom();
  }

  function scrollToBottom() {
    messageList.scrollTop = messageList.scrollHeight;
  }

  function sendChatMessage() {
    const text = chatInput.value.trim();
    if (!text || isThinking) return;

    isThinking = true;
    chatInput.value = '';
    chatInput.style.height = 'auto';
    chatInput.disabled = true;
    sendButton.disabled = true;
    suggestBox.style.display = 'none';

    // 1. Show user message instantly
    appendMessageHTML('user', text);

    // 2. Show thinking loader
    chatLoader.style.display = 'flex';
    scrollToBottom();

    // 3. Prepare payload (limiting history length to last 6 messages to keep context efficient)
    const historyContext = chatSession.slice(-6);

    // 4. Send API Request
    fetch('/chatbot/api/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': CSRF_TOKEN
      },
      body: JSON.stringify({
        message: text,
        history: historyContext
      })
    })
    .then(async response => {
      chatLoader.style.display = 'none';
      let data = {};
      try {
        data = await response.json();
      } catch (err) {
        data = { error: `Server error (${response.status}). Please try again later.` };
      }
      
      if (response.ok) {
        // Successful response
        appendMessageHTML('model', data.response);
        
        // Update local session array and session storage
        chatSession.push({ role: 'user', text: text });
        chatSession.push({ role: 'model', text: data.response });
        sessionStorage.setItem('logiclabs_chat_session', JSON.stringify(chatSession));

        // Update limit display
        if (data.remaining_minute_limit !== undefined) {
          rateRemaining.textContent = `${data.remaining_minute_limit} left this min`;
          if (data.remaining_minute_limit === 0) {
            rateRemaining.style.color = '#ff2d78';
          } else {
            rateRemaining.style.color = 'rgba(240, 234, 255, 0.25)';
          }
        }
      } else {
        // Handle server errors or rate limit
        const errMsg = data.error || 'Oops, something went wrong. Please try again.';
        appendErrorHTML(errMsg);
        
        if (response.status === 429) {
          rateRemaining.textContent = 'Rate Limited';
          rateRemaining.style.color = '#ff2d78';
        }
      }
    })
    .catch(err => {
      chatLoader.style.display = 'none';
      appendErrorHTML('Network error: Could not connect to chatbot server. Please check your connection.');
      console.error(err);
    })
    .finally(() => {
      isThinking = false;
      chatInput.disabled = false;
      sendButton.disabled = false;
      chatInput.focus();
      
      // If window closed, show unread badge
      if (!chatWindow.classList.contains('open')) {
        unreadBadge.style.display = 'block';
      }
    });
  }
</script>
