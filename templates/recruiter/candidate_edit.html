<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogicLabs — Edit Candidate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a1a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .wrap { width: 100%; max-width: 560px; }

        .back-link {
            color: #9ca3af;
            text-decoration: none;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
        }
        .back-link:hover { color: #fff; }

        .page-title {
            font-size: 11px;
            letter-spacing: 3px;
            color: #7c3aed;
            font-family: 'Courier New', monospace;
        }

        .page-heading {
            font-size: 24px;
            font-weight: 700;
            margin-top: 4px;
            margin-bottom: 24px;
        }

        .card {
            background: rgba(15,15,35,0.8);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px;
            padding: 28px;
        }

        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 12px;
            letter-spacing: 0.5px;
            color: #9ca3af;
            margin-bottom: 7px;
        }

        input, textarea {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 11px 14px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #7c3aed;
        }

        textarea { resize: vertical; min-height: 90px; }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            padding: 11px 22px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .btn-save {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: #fff;
        }

        .btn-cancel {
            background: rgba(255,255,255,0.06);
            color: #9ca3af;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div class="wrap">
    <a href="/recruiter/candidates/{{ candidate.id }}/view/" class="back-link">&larr; Back to Overview</a>

    <div class="page-title">// RECRUITER PANEL</div>
    <div class="page-heading">Edit Candidate</div>

    <div class="card">
        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" value="{{ candidate.full_name }}">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ candidate.email }}">
            </div>

            <div class="form-group">
                <label for="mobile">Mobile</label>
                <input type="text" id="mobile" name="mobile" value="{{ candidate.mobile|default:'' }}">
            </div>

            <div class="form-group">
                <label for="organization">Organization</label>
                <input type="text" id="organization" name="organization" value="{{ candidate.organization|default:'' }}">
            </div>

            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio">{{ candidate.bio }}</textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-save">Save Changes</button>
                <a href="/recruiter/candidates/" class="btn btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
