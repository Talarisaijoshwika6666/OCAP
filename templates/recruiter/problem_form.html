<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicLabs — Add Question</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800" rel="stylesheet">
<style>
:root {
    --bg-void: #030611;
    --neon-blue: #00e5ff;
    --neon-purple: #7000ff;
    --text-primary: #e0f2fe;
    --text-dim: rgba(224, 242, 254, 0.45);
    --sidebar-w: 240px;
    --font-display: 'Orbitron', sans-serif;
    --font-body: 'Inter', sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
}
.sidebar {
    width: var(--sidebar-w);
    background: rgba(10, 14, 30, 0.9);
    border-right: 1px solid rgba(0, 229, 255, 0.15);
    min-height: 100vh;
    padding: 24px 16px;
    position: fixed;
}
.sidebar a {
    display: block;
    color: var(--text-dim);
    text-decoration: none;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 14px;
}
.sidebar a:hover, .sidebar a.active {
    background: rgba(0, 229, 255, 0.1);
    color: var(--neon-blue);
}
.main {
    margin-left: var(--sidebar-w);
    padding: 32px;
    width: 100%;
    max-width: 700px;
}
.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
}
.page-title {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--neon-blue);
}
.btn-back {
    background: rgba(255,255,255,0.05);
    color: var(--text-primary);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 8px 16px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
}
.form-group {
    margin-bottom: 16px;
}
label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--text-dim);
}
input, select, textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text-primary);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
}
textarea { min-height: 90px; resize: vertical; }
.btn-neon {
    background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
    color: #fff;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
}
.btn-cancel {
    background: rgba(255,255,255,0.05);
    color: var(--text-primary);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 10px 24px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    margin-right: 10px;
}
</style>
</head>
<body>

<div class="sidebar">
    <a href="/recruiter/dashboard/"><i class="fa-solid fa-gauge"></i> Dashboard</a>
    <a href="/recruiter/problems/" class="active"><i class="fa-solid fa-database"></i> Problem Bank</a>
</div>

<div class="main">
    <div class="page-header">
        <div class="page-title">Add Question</div>
        <a href="/recruiter/problems/" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Back</a>
    </div>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" required>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description" required></textarea>
        </div>

        <div class="form-group">
            <label>Topic</label>
            <input type="text" name="topic" placeholder="e.g. Arrays, Strings">
        </div>

        <div class="form-group">
            <label>Difficulty</label>
            <select name="difficulty" required>
                <option value="">Select difficulty</option>
                <option value="Easy">Easy</option>
                <option value="Medium">Medium</option>
                <option value="Hard">Hard</option>
            </select>
        </div>

        <div class="form-group">
            <label>Sample Input</label>
            <textarea name="sample_input"></textarea>
        </div>

        <div class="form-group">
            <label>Sample Output</label>
            <textarea name="sample_output"></textarea>
        </div>

        <div class="form-group">
            <label>Hint</label>
            <textarea name="hint"></textarea>
        </div>

        <div class="form-group">
            <label>Reference Answer</label>
            <textarea name="answer"></textarea>
        </div>

        <div class="form-group">
            <label>Time Limit (minutes)</label>
            <input type="number" name="time_limit" value="60">
        </div>

        <div style="margin-top: 24px;">
            <a href="/recruiter/problems/" class="btn-cancel">Cancel</a>
            <button type="submit" class="btn-neon">Save Question</button>
        </div>
    </form>
</div>

</body>
</html>
