<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicLabs — Add Question</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
    --bg-void: #030611;
    --neon-blue: #00e5ff;
    --neon-purple: #7000ff;
    --neon-indigo: #0052ff;
    --neon-cyan: #00f5ff;
    --neon-pink: #00a2ff;
    --text-primary: #e0f2fe;
    --text-dim: rgba(224, 242, 254, 0.45);
    --sidebar-w: 240px;
    --font-display: 'Orbitron', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-code: 'JetBrains Mono', monospace;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    overflow-x: hidden;
    position: relative;
}

/* ── BACKGROUND GLOW LAYER ── */
.bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
        radial-gradient(ellipse 700px 500px at 15% 50%, rgba(0, 114, 255, 0.15) 0%, transparent 65%),
        radial-gradient(ellipse 600px 400px at 85% 30%, rgba(0, 240, 255, 0.12) 0%, transparent 65%),
        radial-gradient(ellipse 500px 400px at 50% 90%, rgba(0, 82, 255, 0.10) 0%, transparent 65%),
        radial-gradient(ellipse 400px 300px at 90% 80%, rgba(0, 229, 255, 0.10) 0%, transparent 65%);
}

.bg-layer::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(rgba(0, 114, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.04) 1px, transparent 1px);
    background-size: 55px 55px;
}

/* ── Sidebar ── */
.sidebar {
    width: var(--sidebar-w);
    min-height: 100vh;
    background: rgba(8, 5, 18, 0.95);
    border-right: 1px solid rgba(0, 114, 255, 0.2);
    display: flex;
    flex-direction: column;
    padding: 24px 0;
    position: fixed;
    top: 0; left: 0;
    backdrop-filter: blur(24px);
    z-index: 1000;
    height: 100vh;
    overflow-y: auto;
}

.sidebar::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 1px; height: 100%;
    background: linear-gradient(180deg,
      transparent 0%,
      rgba(0, 240, 255, 0.6) 25%,
      rgba(176, 38, 255, 0.8) 50%,
      rgba(0, 82, 255, 0.6) 75%,
      transparent 100%);
}

.sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 20px 24px;
    border-bottom: 1px solid rgba(0,114,255,0.15);
}

.logo-icon {
    width: 38px; height: 38px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
}

.logo-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 8px;
    display: block;
}

.logo-text { font-size: 18px; font-weight: 700; font-family: var(--font-display); }
.logo-text .logic { color: #fff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); }
.logo-text .labs  {
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 8px rgba(0, 114, 255, 0.45));
}

.sidebar-section {
    padding: 18px 20px 6px;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(0,114,255,0.5);
    text-transform: uppercase;
    font-family: var(--font-code);
}

.nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 20px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    border-left: 3px solid transparent;
    transition: all 0.25s;
    cursor: pointer;
    margin: 2px 8px;
    border-radius: 9px;
}

.nav-item:hover {
    color: var(--neon-blue);
    background: rgba(0, 240, 255, 0.05);
    border-left-color: var(--neon-blue);
    transform: translateX(4px);
}

.nav-item.active {
    color: var(--neon-purple);
    background: rgba(176, 38, 255, 0.07);
    border-left-color: var(--neon-purple);
}

.nav-icon { font-size: 16px; width: 20px; text-align: center; }

.sidebar-bottom {
    margin-top: auto;
    padding: 16px 20px;
    border-top: 1px solid rgba(0,114,255,0.15);
}

.recruiter-info {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
}

.recruiter-avatar {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 12px rgba(0, 240, 255, 0.4);
    color: white;
    flex-shrink: 0;
}

.recruiter-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
}

.recruiter-role {
    font-size: 11px;
    font-family: var(--font-code);
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.btn-logout {
    width: 100%;
    padding: 9px;
    background: rgba(0, 240, 255, 0.05);
    border: 1px solid rgba(0, 240, 255, 0.2);
    border-radius: 8px;
    color: var(--neon-blue);
    font-size: 13px;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    display: block;
    transition: all 0.2s;
    font-family: var(--font-code);
}

.btn-logout:hover {
    background: rgba(0, 114, 255, 0.15);
    border-color: rgba(0, 114, 255, 0.4);
    box-shadow: 0 0 12px rgba(0, 114, 255, 0.25);
    color: var(--text-primary);
}

/* ── Main Content ── */
.main {
    margin-left: var(--sidebar-w);
    flex: 1;
    padding: 32px;
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: calc(100% - var(--sidebar-w));
}
.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
}
.page-title {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--neon-blue);
}
.btn-back {
    background: rgba(255,255,255,0.05);
    color: var(--text-primary);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 8px 16px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
}
.form-group {
    margin-bottom: 16px;
}
label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--text-dim);
}
input, select, textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text-primary);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
}
textarea { min-height: 90px; resize: vertical; }
.btn-neon {
    background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
    color: #fff;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
}
.btn-cancel {
    background: rgba(255,255,255,0.05);
    color: var(--text-primary);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 10px 24px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    margin-right: 10px;
}
</style>
</head>
<body>

<!-- Background glow layer -->
<div class="bg-layer"></div>

<!-- Sidebar -->
{% include 'recruiter/sidebar.html' with active_page='problems' %}

<div class="main">
    <div class="page-header">
        <div class="page-title">Add Question</div>
        <a href="/recruiter/problems/" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Back</a>
    </div>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" required>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description" required></textarea>
        </div>

        <div class="form-group">
            <label>Topic</label>
            <input type="text" name="topic" placeholder="e.g. Arrays, Strings">
        </div>

        <div class="form-group">
            <label>Difficulty</label>
            <select name="difficulty" required>
                <option value="">Select difficulty</option>
                <option value="Easy">Easy</option>
                <option value="Medium">Medium</option>
                <option value="Hard">Hard</option>
            </select>
        </div>

        <div class="form-group">
            <label>Sample Input</label>
            <textarea name="sample_input"></textarea>
        </div>

        <div class="form-group">
            <label>Sample Output</label>
            <textarea name="sample_output"></textarea>
        </div>

        <div class="form-group">
            <label>Hint</label>
            <textarea name="hint"></textarea>
        </div>

        <div class="form-group">
            <label>Reference Answer</label>
            <textarea name="answer"></textarea>
        </div>

        <div class="form-group">
            <label>Time Limit (minutes)</label>
            <input type="number" name="time_limit" value="60">
        </div>

        <div style="margin-top: 24px;">
            <a href="/recruiter/problems/" class="btn-cancel">Cancel</a>
            <button type="submit" class="btn-neon">Save Question</button>
        </div>
    </form>
</div>

</body>
</html>
