<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogicLabs — Create Contest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-void: #030611;
            --neon-blue: #00e5ff;
            --neon-purple: #7000ff;
            --text-primary: #e0f2fe;
            --sidebar-w: 240px;
            --font-body: 'Inter', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }
        body {
            background: var(--bg-void);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
        }
        .main { margin-left: var(--sidebar-w); padding: 24px; flex-grow: 1; }
        .page-title { font-family: var(--font-code); color: var(--neon-purple); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }
        .page-heading { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 24px; }
        
        .format-card {
            background: rgba(12, 8, 28, 0.6);
            border: 1px solid rgba(0, 114, 255, 0.15);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: block;
            color: var(--text-primary);
        }
        .format-card:hover {
            border-color: var(--neon-cyan);
            transform: translateY(-5px);
            color: var(--text-primary);
            background: rgba(12, 8, 28, 0.9);
        }
        .format-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            color: var(--neon-purple);
        }
    </style>
</head>
<body>

{% include 'recruiter/sidebar.html' with active_page='contests' %}

<div class="main">
    <div class="page-title">// CREATE NEW CONTEST</div>
    <div class="page-heading">Select Contest Format</div>

    <div class="row g-4 mt-4">
        <div class="col-md-6">
            <a href="{% url 'recruiter_contest_create_objective' %}" class="format-card">
                <div class="format-icon"><i class="fas fa-list-ul"></i></div>
                <h4>Objective Format</h4>
                <p class="text-muted">Create a contest with Multiple Choice Questions (MCQs).</p>
            </a>
        </div>
        <div class="col-md-6">
            <a href="{% url 'recruiter_contest_create_interactive' %}" class="format-card">
                <div class="format-icon"><i class="fas fa-laptop-code"></i></div>
                <h4>Interactive Format</h4>
                <p class="text-muted">Create a coding contest with Programming Questions and Test Cases.</p>
            </a>
        </div>
    </div>
</div>
</body>
</html>
