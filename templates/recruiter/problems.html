<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogicLabs — Problem Bank</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800" rel="stylesheet">
<style>
:root {
    --bg-void: #030611;
    --neon-blue: #00e5ff;
    --neon-purple: #7000ff;
    --text-primary: #e0f2fe;
    --text-dim: rgba(224, 242, 254, 0.45);
    --sidebar-w: 240px;
    --font-display: 'Orbitron', sans-serif;
    --font-body: 'Inter', sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
}
.sidebar {
    width: var(--sidebar-w);
    background: rgba(10, 14, 30, 0.9);
    border-right: 1px solid rgba(0, 229, 255, 0.15);
    min-height: 100vh;
    padding: 24px 16px;
    position: fixed;
}
.sidebar a {
    display: block;
    color: var(--text-dim);
    text-decoration: none;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 14px;
}
.sidebar a:hover, .sidebar a.active {
    background: rgba(0, 229, 255, 0.1);
    color: var(--neon-blue);
}
.main {
    margin-left: var(--sidebar-w);
    padding: 32px;
    width: 100%;
}
.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
}
.page-title {
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--neon-blue);
}
.btn-neon {
    background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
    color: #fff;
    border: none;
    padding: 8px 18px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    cursor: pointer;
}
.btn-back {
    background: rgba(255,255,255,0.05);
    color: var(--text-primary);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 8px 16px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
    margin-right: 10px;
}
.filters {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    align-items: center;
}
.filters input[type="text"] {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text-primary);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
}
.filters input[type="text"]::placeholder {
    color: var(--text-dim);
}
.filters select {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text-primary);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    min-width: 140px;
}
.filters select option {
    background: #0a0e1e;
    color: var(--text-primary);
}
.filters .btn-neon {
    padding: 10px 22px;
    font-weight: 600;
    white-space: nowrap;
}
table {
    width: 100%;
    border-collapse: collapse;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    overflow: hidden;
}
th, td {
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 14px;
}
th {
    color: var(--neon-blue);
    font-family: var(--font-display);
    font-size: 12px;
    text-transform: uppercase;
}
.badge-easy { color: #4ade80; }
.badge-medium { color: #facc15; }
.badge-hard { color: #f87171; }
.btn-delete {
    background: rgba(248, 113, 113, 0.15);
    color: #f87171;
    border: 1px solid rgba(248, 113, 113, 0.3);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="sidebar">
    <a href="/recruiter/dashboard/"><i class="fa-solid fa-gauge"></i> Dashboard</a>
    <a href="/recruiter/problems/" class="active"><i class="fa-solid fa-database"></i> Problem Bank</a>
</div>

<div class="main">
    <div class="page-header">
        <div class="page-title">Problem Bank</div>
        <div>
            <a href="/recruiter/dashboard/" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Back</a>
            <a href="/recruiter/problems/add/" class="btn-neon"><i class="fa-solid fa-plus"></i> Add Question</a>
        </div>
    </div>

    <form method="get" class="filters">
        <input type="text" name="search" placeholder="Search by title or description..." value="{{ search }}">
        <select name="topic">
            <option value="">All Topics</option>
            {% for t in topics %}
            <option value="{{ t }}" {% if topic == t %}selected{% endif %}>{{ t }}</option>
            {% endfor %}
        </select>
        <select name="difficulty">
            <option value="">All Levels</option>
            <option value="Easy" {% if difficulty == "Easy" %}selected{% endif %}>Easy</option>
            <option value="Medium" {% if difficulty == "Medium" %}selected{% endif %}>Medium</option>
            <option value="Hard" {% if difficulty == "Hard" %}selected{% endif %}>Hard</option>
        </select>
        <button type="submit" class="btn-neon"><i class="fa-solid fa-filter"></i> Apply</button>
    </form>

    <p style="color: var(--text-dim); margin-bottom: 12px;">Total Questions: {{ total_problems }}</p>

    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Topic</th>
                <th>Difficulty</th>
                <th>Time Limit</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for q in questions %}
            <tr>
                <td>{{ q.title }}</td>
                <td>{{ q.topic }}</td>
                <td class="badge-{{ q.difficulty|lower }}">{{ q.difficulty }}</td>
                <td>{{ q.time_limit }} min</td>
                <td>
                    <form method="post" action="/recruiter/problems/{{ q.id }}/delete/" onsubmit="return confirm('Delete this question?');" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn-delete"><i class="fa-solid fa-trash"></i> Delete</button>
                    </form>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="5" style="text-align:center; color: var(--text-dim);">No questions yet.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
