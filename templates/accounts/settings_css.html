<style>
  .settings-wrap {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 24px;
    align-items: start;
  }

  @media (max-width: 900px) {
    .settings-wrap { grid-template-columns: 1fr; }
  }

  /* ── LEFT NAV ── */
  .settings-menu {
    position: sticky;
    top: 76px;
    padding: 10px;
    background: var(--surface-card);
    border: 1px solid var(--surface-border);
  }

  .settings-menu-title {
    font-family: var(--font-display);
    font-size: 0.72rem;
    letter-spacing: 2px;
    color: var(--neon-purple);
    padding: 6px 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .settings-tab {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.86rem;
    font-weight: 600;
    margin-bottom: 4px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s ease;
  }

  .settings-tab i { width: 18px; text-align: center; }

  .settings-tab:hover {
    color: var(--neon-cyan);
    background: rgba(0,255,247,0.06);
    border-color: rgba(0,255,247,0.15);
  }

  .settings-tab.active {
    color: #fff;
    background: linear-gradient(135deg, rgba(255,45,120,0.18), rgba(176,38,255,0.18));
    border-color: rgba(255,45,120,0.35);
    box-shadow: 0 0 15px rgba(176,38,255,0.12);
  }

  /* ── RIGHT PANEL ── */
  .settings-panel { display: none; }
  .settings-panel.active { display: block; }

  .settings-card {
    padding: 28px 30px;
    margin-bottom: 20px;
    border: 1px solid var(--surface-border);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .settings-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(176,38,255,0.08);
  }

  .settings-card-title {
    font-family: var(--font-display);
    font-size: 0.95rem;
    font-weight: 800;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .settings-card-title i { color: var(--neon-pink); }

  .settings-card-sub {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 22px;
  }

  .settings-field-label {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 6px;
    display: block;
  }

  /* Apply the same visual treatment to both settings-specific controls
     and any standard `.form-control` elements rendered by Django widgets. */
  .settings-form-control, .form-control {
    width: 100%;
    --settings-control-bg: rgba(255,255,255,0.03);
    background: var(--settings-control-bg);
    border: 1px solid var(--surface-border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text-primary);
    font-size: 0.85rem;
    font-family: var(--font-body);
    transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  }
  [data-theme="light"] .settings-form-control, [data-theme="light"] .form-control {
    --settings-control-bg: rgba(255,255,255,0.95);
    background: var(--settings-control-bg);
    color: var(--text-primary);
  }
  select.settings-form-control option, select.form-control option {
    background: var(--surface-card) !important;
    color: var(--text-primary) !important;
  }
  /* Ensure select dropdown and its options follow the active theme colors
     across browsers. Some browsers render native white dropdowns which
     make options unreadable in dark mode; enforce theme colors where
     possible without redesigning the native control. */
  .settings-form-control option,
  .form-control option {
    background: var(--surface-card) !important;
    color: var(--text-primary) !important;
  }
  /* Preserve native select arrow while allowing themed colors */
  select.settings-form-control, select.form-control { -webkit-appearance: menulist-button; appearance: menulist-button; }
  /* Chromium/WebKit specific fixes for autofill/text fill color */
  .settings-form-control:-webkit-autofill,
  .settings-form-control:-webkit-autofill:focus,
  .settings-form-control:-webkit-autofill:hover,
  .settings-form-control:-webkit-autofill:active,
  .settings-form-control:-webkit-autofill::first-line,
  .settings-form-control:-internal-autofill-selected,
  .form-control:-webkit-autofill,
  .form-control:-webkit-autofill:focus,
  .form-control:-webkit-autofill:hover,
  .form-control:-webkit-autofill:active,
  .form-control:-webkit-autofill::first-line,
  .form-control:-internal-autofill-selected,
  input:-webkit-autofill,
  input:-webkit-autofill:focus,
  input:-webkit-autofill:hover,
  input:-webkit-autofill:active,
  input:-webkit-autofill::first-line,
  input:-internal-autofill-selected,
  textarea:-webkit-autofill,
  textarea:-webkit-autofill:focus,
  textarea:-webkit-autofill:hover,
  textarea:-webkit-autofill:active,
  textarea:-webkit-autofill::first-line,
  textarea:-internal-autofill-selected,
  select:-webkit-autofill,
  select:-webkit-autofill:focus,
  select:-webkit-autofill:hover,
  select:-webkit-autofill:active,
  select:-webkit-autofill::first-line,
  select:-internal-autofill-selected {
    -webkit-text-fill-color: var(--text-primary) !important;
    color: var(--text-primary) !important;
    background-color: var(--settings-control-bg) !important;
    background-image: none !important;
    background-clip: padding-box !important;
    -webkit-background-clip: padding-box !important;
    -webkit-box-shadow: 0 0 0px 1000px var(--settings-control-bg) inset !important;
    box-shadow: 0 0 0px 1000px var(--settings-control-bg) inset !important;
    border-color: var(--surface-border) !important;
    transition: background-color 5000s ease-in-out 0s !important;
    caret-color: var(--text-primary) !important;
  }
  .settings-form-control::placeholder,
  .form-control::placeholder {
    color: var(--text-dim);
    opacity: 1;
  }
  /* Firefox autofill */
  input:-moz-autofill,
  textarea:-moz-autofill,
  select:-moz-autofill,
  .settings-form-control:-moz-autofill,
  .form-control:-moz-autofill {
    box-shadow: 0 0 0px 1000px var(--surface-card) inset !important;
    -moz-text-fill-color: var(--text-primary) !important;
    color: var(--text-primary) !important;
    caret-color: var(--text-primary) !important;
  }
  /* IE/Edge value color handling */
  .settings-form-control::-ms-value, .form-control::-ms-value { color: var(--text-primary); background: var(--surface-card); }

  /* Focus/hover/disabled states for inputs and selects */
  .settings-form-control:focus, .form-control:focus {
    outline: none;
    border-color: var(--neon-purple);
    box-shadow: 0 0 0 3px rgba(176,38,255,0.12);
    background: var(--surface-card);
  }
  .settings-form-control:hover, .form-control:hover {
    border-color: rgba(176,38,255,0.25);
  }
  .settings-form-control:disabled, .form-control:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    background: rgba(255,255,255,0.02);
  }
  select.settings-form-control option:hover, select.form-control option:hover {
    background: rgba(255,255,255,0.04);
  }

  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 4px;
    border-bottom: 1px solid var(--surface-border);
    gap: 20px;
  }
  .settings-row:last-child { border-bottom: none; }

  .settings-row-text .t { font-size: 0.87rem; font-weight: 600; color: var(--text-primary); }
  .settings-row-text .d { font-size: 0.76rem; color: var(--text-dim); margin-top: 2px; }

  /* ── TOGGLE SWITCH ── */
  .toggle-switch {
    position: relative;
    width: 46px;
    height: 26px;
    flex-shrink: 0;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--surface-border);
    border-radius: 30px;
    transition: 0.25s;
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    height: 18px; width: 18px;
    left: 3px; top: 50%;
    transform: translateY(-50%);
    background: var(--text-dim);
    border-radius: 50%;
    transition: 0.25s;
  }
  .toggle-switch input:checked + .toggle-slider {
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
    border-color: transparent;
  }
  .toggle-switch input:checked + .toggle-slider::before {
    transform: translate(20px, -50%);
    background: #fff;
  }

  .settings-save-btn { margin-top: 6px; }

  .settings-preview {
    width: 96px;
    height: 96px;
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid var(--surface-border);
    background: var(--surface-1-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 1.4rem;
    color: var(--text-primary);
    margin-bottom: 10px;
  }

  .settings-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .settings-inline-note {
    font-size: 0.73rem;
    color: var(--text-dim);
    margin-top: 6px;
  }

  .about-row {
    display: flex;
    justify-content: space-between;
    padding: 12px 4px;
    border-bottom: 1px solid var(--surface-border);
    font-size: 0.85rem;
  }
  .about-row:last-child { border-bottom: none; }
  .about-row .k { color: var(--text-dim); }
  .about-row .v { color: var(--text-primary); font-weight: 600; }
</style>
