<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Candidate Sign Up</title>
<style>
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0d1117;
        font-family: 'Segoe UI', sans-serif;
    }
    .card {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 12px;
        padding: 40px;
        width: 360px;
        box-shadow: 0 0 25px rgba(0, 255, 200, 0.08);
    }
    h2 {
        color: #00e5ff;
        text-align: center;
        margin-bottom: 24px;
    }
    label {
        color: #c9d1d9;
        font-size: 13px;
        display: block;
        margin-bottom: 6px;
        margin-top: 14px;
    }
    input {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #30363d;
        background: #0d1117;
        color: #e6edf3;
        box-sizing: border-box;
        font-size: 14px;
    }
    input:focus {
        outline: none;
        border-color: #00e5ff;
    }
    .strength-bar {
        height: 6px;
        border-radius: 3px;
        margin-top: 8px;
        background: #30363d;
        overflow: hidden;
    }
    .strength-fill {
        height: 100%;
        width: 0%;
        transition: width 0.2s ease, background 0.2s ease;
    }
    .strength-label {
        font-size: 12px;
        margin-top: 4px;
        color: #8b949e;
    }
    button {
        width: 100%;
        margin-top: 22px;
        padding: 11px;
        border: none;
        border-radius: 6px;
        background: #00e5ff;
        color: #0d1117;
        font-weight: 600;
        cursor: pointer;
        font-size: 14px;
    }
    button:disabled {
        background: #30363d;
        color: #6e7681;
        cursor: not-allowed;
    }
    .error {
        background: #3d1418;
        border: 1px solid #f85149;
        color: #f85149;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 13px;
        margin-bottom: 10px;
    }
    .footer-link {
        text-align: center;
        margin-top: 18px;
        font-size: 13px;
    }
    .footer-link a {
        color: #00e5ff;
        text-decoration: none;
    }
</style>
</head>
<body>
<div class="card">
    <h2>Candidate Sign Up</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" id="registerForm">
        {% csrf_token %}
        <label>Username</label>
        <input type="text" name="username" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="password" name="password1" id="password1" required>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel">Minimum 8 characters</div>

        <label>Confirm Password</label>
        <input type="password" name="password2" id="password2" required>
        <div class="strength-label" id="matchLabel"></div>

        <button type="submit" id="submitBtn">Create Account</button>
    </form>

    <div class="footer-link">
        Already have an account? <a href="/accounts/login/?panel=candidate">Log in</a>
    </div>
</div>

<script>
    const pw1 = document.getElementById('password1');
    const pw2 = document.getElementById('password2');
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    const matchLabel = document.getElementById('matchLabel');
    const submitBtn = document.getElementById('submitBtn');

    function checkStrength() {
        const val = pw1.value;
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const levels = [
            { width: '0%',   color: '#30363d', text: 'Minimum 8 characters' },
            { width: '25%',  color: '#f85149', text: 'Weak' },
            { width: '50%',  color: '#f0883e', text: 'Fair' },
            { width: '75%',  color: '#d29922', text: 'Good' },
            { width: '100%', color: '#3fb950', text: 'Strong' }
        ];
        const lvl = val.length === 0 ? levels[0] : levels[score] || levels[1];
        fill.style.width = lvl.width;
        fill.style.background = lvl.color;
        label.textContent = lvl.text;
        label.style.color = lvl.color;

        validateForm();
    }

    function checkMatch() {
        if (pw2.value.length === 0) {
            matchLabel.textContent = '';
        } else if (pw1.value === pw2.value) {
            matchLabel.textContent = 'Passwords match';
            matchLabel.style.color = '#3fb950';
        } else {
            matchLabel.textContent = 'Passwords do not match';
            matchLabel.style.color = '#f85149';
        }
        validateForm();
    }

    function validateForm() {
        const valid = pw1.value.length >= 8 && pw1.value === pw2.value;
        submitBtn.disabled = !valid;
    }

    pw1.addEventListener('input', checkStrength);
    pw2.addEventListener('input', checkMatch);
    validateForm();
</script>
</body>
</html>
