{% extends 'base.html' %}
{% block page_title %}// Register{% endblock %}
{% block content %}

<style>
  .sidebar { display: none !important; }
  .main-content { margin-left: 0 !important; }
  .topbar { display: none !important; }
  .page-content {
    padding: 0 !important;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>

<div style="width:100%;max-width:440px;margin:0 auto;padding:20px;">

  <div style="text-align:center;margin-bottom:32px;">
    <div style="display:inline-flex;flex-direction:column;align-items:center;gap:12px;">
      <div style="position:relative;width:72px;height:72px;">
        <div style="position:absolute;inset:-4px;border-radius:18px;background:linear-gradient(135deg,#00d4ff,#b026ff,#ff2d78);opacity:0.4;filter:blur(8px);"></div>
        <div style="position:relative;width:72px;height:72px;border-radius:16px;background:linear-gradient(135deg,#00d4ff 0%,#b026ff 50%,#ff2d78 100%);display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(176,38,255,0.5);">
          <svg width="42" height="42" viewBox="0 0 48 48" fill="none">
            <path d="M24 8 C18 8 10 12 10 20 C10 26 13 29 13 33 C13 37 16 40 20 40 C22 40 24 39 24 39" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
            <path d="M24 8 C30 8 38 12 38 20 C38 26 35 29 35 33 C35 37 32 40 28 40 C26 40 24 39 24 39" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
            <circle cx="14" cy="20" r="2" fill="#00fff7"/>
            <circle cx="12" cy="28" r="1.5" fill="#00fff7"/>
            <circle cx="17" cy="35" r="1.5" fill="#00fff7"/>
            <circle cx="34" cy="20" r="2" fill="#ff2d78"/>
            <circle cx="36" cy="28" r="1.5" fill="#ff2d78"/>
            <circle cx="31" cy="35" r="1.5" fill="#ff2d78"/>
            <line x1="24" y1="8" x2="24" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="3,3"/>
          </svg>
        </div>
      </div>
      <div>
        <div style="font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:900;letter-spacing:2px;line-height:1;">
          <span style="color:#e0e0ff;">Logic</span><span style="background:linear-gradient(90deg,#00d4ff,#b026ff,#ff2d78);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Labs</span>
        </div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:0.55rem;letter-spacing:3px;text-transform:uppercase;margin-top:6px;color:rgba(240,234,255,0.4);">
          Code &bull; Think &bull; Solve &bull; Innovate
        </div>
      </div>
    </div>
  </div>

  <div style="background:rgba(12,8,28,0.85);border:1px solid rgba(176,38,255,0.25);border-radius:20px;padding:32px;backdrop-filter:blur(24px);position:relative;overflow:hidden;">
    <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#ff2d78,#b026ff,#00fff7,transparent);"></div>

    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:0.7rem;letter-spacing:3px;color:#b026ff;margin-bottom:6px;">// GET STARTED</div>
      <div style="font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;color:#f0eaff;">Join LogicLabs</div>
    </div>

    {% if form.errors %}
    <div style="background:rgba(255,45,120,0.1);border:1px solid rgba(255,45,120,0.3);border-radius:10px;padding:12px 16px;margin-bottom:18px;color:#ff2d78;font-size:0.8rem;font-family:'JetBrains Mono',monospace;">
      <i class="fas fa-exclamation-triangle" style="margin-right:8px;"></i>{{ form.errors|first }}
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <div style="margin-bottom:16px;">
        <label style="display:block;color:rgba(240,234,255,0.6);font-size:0.75rem;font-family:'JetBrains Mono',monospace;margin-bottom:8px;">
          <i class="fas fa-user" style="color:#b026ff;margin-right:6px;"></i>USERNAME
        </label>
        <input type="text" name="username" placeholder="choose a username"
          style="width:100%;background:rgba(176,38,255,0.06);border:1px solid rgba(176,38,255,0.2);border-radius:10px;padding:12px 16px;color:#f0eaff;font-family:'JetBrains Mono',monospace;font-size:0.85rem;outline:none;"
          onfocus="this.style.borderColor='rgba(255,45,120,0.5)'" onblur="this.style.borderColor='rgba(176,38,255,0.2)'">
      </div>

      <div style="margin-bottom:16px;">
        <label style="display:block;color:rgba(240,234,255,0.6);font-size:0.75rem;font-family:'JetBrains Mono',monospace;margin-bottom:8px;">
          <i class="fas fa-envelope" style="color:#b026ff;margin-right:6px;"></i>EMAIL
        </label>
        <input type="email" name="email" placeholder="you@example.com"
          style="width:100%;background:rgba(176,38,255,0.06);border:1px solid rgba(176,38,255,0.2);border-radius:10px;padding:12px 16px;color:#f0eaff;font-family:'JetBrains Mono',monospace;font-size:0.85rem;outline:none;"
          onfocus="this.style.borderColor='rgba(255,45,120,0.5)'" onblur="this.style.borderColor='rgba(176,38,255,0.2)'">
      </div>

      <div style="margin-bottom:16px;">
        <label style="display:block;color:rgba(240,234,255,0.6);font-size:0.75rem;font-family:'JetBrains Mono',monospace;margin-bottom:8px;">
          <i class="fas fa-lock" style="color:#b026ff;margin-right:6px;"></i>PASSWORD
        </label>
        <input type="password" name="password1" placeholder="create a password"
          style="width:100%;background:rgba(176,38,255,0.06);border:1px solid rgba(176,38,255,0.2);border-radius:10px;padding:12px 16px;color:#f0eaff;font-family:'JetBrains Mono',monospace;font-size:0.85rem;outline:none;"
          onfocus="this.style.borderColor='rgba(255,45,120,0.5)'" onblur="this.style.borderColor='rgba(176,38,255,0.2)'">
      </div>

      <div style="margin-bottom:24px;">
        <label style="display:block;color:rgba(240,234,255,0.6);font-size:0.75rem;font-family:'JetBrains Mono',monospace;margin-bottom:8px;">
          <i class="fas fa-lock" style="color:#b026ff;margin-right:6px;"></i>CONFIRM PASSWORD
        </label>
        <input type="password" name="password2" placeholder="confirm your password"
          style="width:100%;background:rgba(176,38,255,0.06);border:1px solid rgba(176,38,255,0.2);border-radius:10px;padding:12px 16px;color:#f0eaff;font-family:'JetBrains Mono',monospace;font-size:0.85rem;outline:none;"
          onfocus="this.style.borderColor='rgba(255,45,120,0.5)'" onblur="this.style.borderColor='rgba(176,38,255,0.2)'">
      </div>

      <button type="submit"
        style="width:100%;background:linear-gradient(135deg,#ff2d78,#b026ff,#00fff7);border:none;border-radius:10px;padding:13px;font-family:'Orbitron',monospace;font-size:0.88rem;font-weight:700;color:#fff;cursor:pointer;letter-spacing:1px;box-shadow:0 0 20px rgba(176,38,255,0.3);">
        <i class="fas fa-user-plus" style="margin-right:8px;"></i>CREATE ACCOUNT
      </button>
    </form>

    <div style="text-align:center;margin-top:20px;color:rgba(240,234,255,0.4);font-size:0.82rem;">
      Already have an account?
      <a href="/accounts/login/" style="color:#00fff7;font-weight:600;text-decoration:none;">Sign In</a>
    </div>
  </div>
</div>

{% endblock %}
