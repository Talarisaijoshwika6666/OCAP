{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogicLabs — Sign Up</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #03031e; /* Rich Midnight Blue Void */
            --primary: #8B5CF6; /* Neon Purple */
            --secondary: #D946EF; /* Neon Pink */
            --accent: #06B6D4; /* Neon Cyan */
            --text-primary: #FFFFFF;
            --text-muted: #94A3B8;
            --card-bg: rgba(6, 6, 26, 0.72); /* Glassmorphic Midnight Card */
            --border-color: rgba(139, 92, 246, 0.28);
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Poppins', 'Inter', sans-serif;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* ── CYBER MIDNIGHT BACKGROUND & 3D NEON GRID ── */
        .cyber-bg-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background-color: var(--bg-dark);
        }

        /* Ambient neon highlights over midnight blue */
        .cyber-glow-orb-1 {
            position: absolute;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.18) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            filter: blur(55px);
            animation: drift 18s ease-in-out infinite alternate;
        }

        .cyber-glow-orb-2 {
            position: absolute;
            width: 480px;
            height: 480px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.14) 0%, transparent 70%);
            bottom: -150px;
            right: -150px;
            filter: blur(65px);
            animation: drift 22s ease-in-out infinite alternate-reverse;
        }

        .cyber-glow-orb-3 {
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(217, 70, 239, 0.1) 0%, transparent 70%);
            top: 40%;
            left: 30%;
            filter: blur(50px);
            pointer-events: none;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.08); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* 3D Perspective Scrolling Neon Grid */
        .cyber-perspective-grid {
            position: absolute;
            bottom: -30%;
            left: -50%;
            right: -50%;
            height: 140%;
            background-image: 
                linear-gradient(90deg, rgba(6, 182, 212, 0.14) 1px, transparent 1px),
                linear-gradient(0deg, rgba(139, 92, 246, 0.14) 1px, transparent 1px);
            background-size: 45px 45px;
            transform: perspective(280px) rotateX(68deg);
            transform-origin: center top;
            animation: grid-scroll 22s linear infinite;
        }

        @keyframes grid-scroll {
            0% { background-position: 0 0; }
            100% { background-position: 0 1000px; }
        }

        /* Horizon Mask matching midnight blue */
        .cyber-horizon-mask {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 30%, transparent 10%, var(--bg-dark) 80%);
            z-index: 2;
        }

        /* Glowing horizon divider line */
        .cyber-horizon-line {
            position: absolute;
            top: 30%;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                var(--accent) 25%, 
                var(--primary) 50%, 
                var(--secondary) 75%, 
                transparent
            );
            box-shadow: 
                0 0 12px rgba(6, 182, 212, 0.6),
                0 0 25px rgba(139, 92, 246, 0.4);
            z-index: 3;
            opacity: 0.6;
        }

        /* Scanning vertical laser */
        .cyber-laser-scanner {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--primary), var(--secondary), transparent);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
            animation: scan-vertical 10s ease-in-out infinite;
            z-index: 3;
            opacity: 0.28;
        }

        @keyframes scan-vertical {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        /* ── INTERACTIVE CONTAINER ── */
        .container {
            width: 100%;
            max-width: 480px;
            padding: 24px;
            position: relative;
            z-index: 10;
        }

        /* LOGO */
        .logo-area {
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-badge {
            position: relative;
            width: 70px;
            height: 70px;
            margin-bottom: 10px;
        }

        .logo-badge-glow {
            position: absolute;
            inset: -4px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--accent), var(--primary), var(--secondary));
            opacity: 0.5;
            filter: blur(8px);
            animation: logo-glow 3s ease-in-out infinite;
        }

        @keyframes logo-glow {
            0%, 100% { opacity: 0.4; filter: blur(6px); }
            50% { opacity: 0.7; filter: blur(10px); }
        }

        .logo-badge-img {
            position: relative;
            width: 70px;
            height: 70px;
            border-radius: 16px;
            overflow: hidden;
            border: none;
            box-shadow: 
                0 0 25px rgba(139, 92, 246, 0.5),
                0 0 50px rgba(6, 182, 212, 0.2);
            background: #18192e;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-badge-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 5px;
            filter: brightness(1.5) saturate(1.4) drop-shadow(0 0 6px rgba(6, 182, 212, 0.8));
        }

        .logo-text {
            font-family: var(--font-display);
            font-size: 1.9rem;
            font-weight: 900;
            letter-spacing: 2px;
            line-height: 1.1;
            margin-top: 8px;
        }
        
        .logo-text .left-part {
            color: #ffffff;
        }
        
        .logo-text .right-part {
            background: linear-gradient(90deg, var(--accent), var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
        }

        .logo-sub {
            color: var(--text-muted);
            font-size: 0.6rem;
            letter-spacing: 3px;
            margin-top: 4px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        /* CARD */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 36px 36px 32px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.65), 
                0 0 55px rgba(139, 92, 246, 0.08);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .card-glow-border {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--primary), var(--secondary), transparent);
        }

        .card:hover {
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 
                0 20px 45px rgba(0, 0, 0, 0.75), 
                0 0 65px rgba(139, 92, 246, 0.15);
        }

        .card-title {
            font-family: var(--font-display);
            font-size: 1.45rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            letter-spacing: 1px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .card-sub {
            color: var(--text-muted);
            font-size: 0.82rem;
            margin-bottom: 24px;
            text-align: center;
        }

        /* ERROR */
        .error {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #f87171;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.82rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.05);
        }

        /* FIELDS */
        .field { 
            margin-bottom: 18px; 
        }

        .field label {
            display: block;
            color: var(--text-muted);
            font-size: 0.7rem;
            letter-spacing: 1.8px;
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 600;
            font-family: var(--font-display);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.95rem;
            transition: color 0.3s;
            pointer-events: none;
        }

        .field input {
            width: 100%;
            padding: 12px 44px 12px 48px;
            background: rgba(4, 4, 12, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 0.92rem;
            outline: none;
            transition: all 0.3s;
        }

        .field input::placeholder { 
            color: rgba(255, 255, 255, 0.15); 
        }

        .field input:focus {
            border-color: var(--accent);
            box-shadow: 
                0 0 0 1px var(--accent),
                0 0 15px rgba(6, 182, 212, 0.22);
            background: rgba(4, 4, 12, 0.95);
        }
        .field input:focus + .input-icon {
            color: var(--accent);
        }

        /* Password Visibility Toggle */
        .password-toggle-btn {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.35);
            cursor: pointer;
            font-size: 0.95rem;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s;
        }
        
        .password-toggle-btn:hover {
            color: var(--accent);
        }

        /* STRENGTH BAR */
        .strength-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        .strength-fill {
            height: 100%; 
            width: 0%;
            border-radius: 4px;
            transition: width 0.3s, background 0.3s, box-shadow 0.3s;
        }

        .strength-label {
            font-size: 0.72rem;
            margin-top: 6px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
        }

        /* BUTTON */
        button[type="submit"] {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: var(--font-display);
            color: #03031e;
            background: var(--accent);
            box-shadow: 
                0 4px 15px rgba(6, 182, 212, 0.35),
                0 0 30px rgba(6, 182, 212, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button[type="submit"]:hover:not(:disabled) { 
            transform: translateY(-2px);
            background: #fff;
            color: #03031e;
            box-shadow: 
                0 6px 20px rgba(255, 255, 255, 0.45),
                0 0 40px rgba(6, 182, 212, 0.3);
        }
        
        button[type="submit"]:active:not(:disabled) {
            transform: translateY(0);
        }

        button[type="submit"]:disabled {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.25);
            cursor: not-allowed;
            box-shadow: none;
        }

        /* FOOTER */
        .footer-link {
            text-align: center;
            margin-top: 22px;
            color: var(--text-muted);
            font-size: 0.82rem;
        }
        
        .footer-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s, text-shadow 0.2s;
            margin-left: 4px;
        }
        
        .footer-link a:hover {
            color: #fff;
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.6);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--accent), var(--primary));
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <!-- Ambient glowing backgrounds and 3D synth grid -->
    <div class="cyber-bg-container">
        <div class="cyber-glow-orb-1"></div>
        <div class="cyber-glow-orb-2"></div>
        <div class="cyber-glow-orb-3"></div>
        <div class="cyber-perspective-grid"></div>
        <div class="cyber-horizon-mask"></div>
        <div class="cyber-horizon-line"></div>
        <div class="cyber-laser-scanner"></div>
    </div>

    <div class="container">

        <!-- LOGO -->
        <div class="logo-area">
            <div class="logo-badge">
                <div class="logo-badge-glow"></div>
                <div class="logo-badge-img">
                    <img src="{% static 'images/logo_transparent.png' %}" alt="LogicLabs Logo">
                </div>
            </div>
            <div class="logo-text">
                <span class="left-part">Logic</span><span class="right-part">Labs</span>
            </div>
            <div class="logo-sub">CODE · THINK · SOLVE · INNOVATE</div>
        </div>

        <!-- CARD -->
        <div class="card">
            <div class="card-glow-border"></div>
            
            <div class="card-title">Candidate Sign Up</div>
            <div class="card-sub">Create your account to start coding</div>

            {% if error %}
            <div class="error">
                <i class="fas fa-exclamation-triangle"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" id="registerForm">
                {% csrf_token %}
                
                <div class="field">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" name="username" placeholder="Choose a username" required>
                    </div>
                </div>

                <div class="field">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" name="email" placeholder="name@example.com" required>
                    </div>
                </div>

                <div class="field">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" name="password" id="password1" placeholder="••••••••" required>
                        <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('password1', 'eyeIcon1')">
                            <i class="far fa-eye" id="eyeIcon1"></i>
                        </button>
                    </div>
                    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                    <div class="strength-label" id="strengthLabel">Minimum 8 characters</div>
                </div>

                <div class="field">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" name="confirm_password" id="password2" placeholder="••••••••" required>
                        <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('password2', 'eyeIcon2')">
                            <i class="far fa-eye" id="eyeIcon2"></i>
                        </button>
                    </div>
                    <div class="strength-label" id="matchLabel"></div>
                </div>

                <button type="submit" id="submitBtn">CREATE ACCOUNT <i class="fas fa-arrow-right"></i></button>
            </form>

            <div class="footer-link">
                Already have an account? <a href="/accounts/login/?panel=candidate">Log in</a>
            </div>
        </div>

    </div>

    <script>
        const pw1 = document.getElementById('password1');
        const pw2 = document.getElementById('password2');
        const fill = document.getElementById('strengthFill');
        const label = document.getElementById('strengthLabel');
        const matchLabel = document.getElementById('matchLabel');
        const submitBtn = document.getElementById('submitBtn');

        function checkStrength() {
            const val = pw1.value;
            let score = 0;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            // Premium Cyberpunk Neon Level Colors & Glows
            const levels = [
                { width: '0%',   color: 'rgba(255, 255, 255, 0.05)', text: 'Minimum 8 characters', glow: 'none' },
                { width: '25%',  color: '#ff2d78', text: 'Weak (Add numbers/caps)', glow: '0 0 10px rgba(255, 45, 120, 0.5)' },
                { width: '50%',  color: '#f97316', text: 'Fair (Try a special character)', glow: '0 0 10px rgba(249, 115, 22, 0.5)' },
                { width: '75%',  color: '#8B5CF6', text: 'Good (Almost there)', glow: '0 0 10px rgba(139, 92, 246, 0.5)' },
                { width: '100%', color: '#00ff82', text: 'Strong (Cyber-secure)', glow: '0 0 12px rgba(0, 255, 130, 0.6)' }
            ];
            const lvl = val.length === 0 ? levels[0] : levels[score] || levels[1];
            fill.style.width = lvl.width;
            fill.style.background = lvl.color;
            fill.style.boxShadow = lvl.glow;
            label.textContent = lvl.text;
            label.style.color = lvl.color === 'rgba(255, 255, 255, 0.05)' ? 'var(--text-muted)' : lvl.color;

            validateForm();
        }

        function checkMatch() {
            if (pw2.value.length === 0) {
                matchLabel.textContent = '';
            } else if (pw1.value === pw2.value) {
                matchLabel.textContent = '✓ Passwords match';
                matchLabel.style.color = '#00ff82';
            } else {
                matchLabel.textContent = '✗ Passwords do not match';
                matchLabel.style.color = '#ff2d78';
            }
            validateForm();
        }

        function validateForm() {
            const valid = pw1.value.length >= 8 && pw1.value === pw2.value;
            submitBtn.disabled = !valid;
        }

        function togglePasswordVisibility(inputId, eyeIconId) {
            var passwordInput = document.getElementById(inputId);
            var eyeIcon = document.getElementById(eyeIconId);
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('far', 'fa-eye');
                eyeIcon.classList.add('fas', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fas', 'fa-eye-slash');
                eyeIcon.classList.add('far', 'fa-eye');
            }
        }

        pw1.addEventListener('input', checkStrength);
        pw2.addEventListener('input', checkMatch);
        validateForm();
    </script>
</body>
</html>
