{% extends 'base.html' %}
{% block content %}
<div class="container mt-5" style="max-width:750px;">
  <h3 style="color:#f59e0b;font-weight:800;margin-bottom:30px;"><i class="fas fa-pen"></i> New Post</h3>
  <div class="card-dark p-4">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label style="color:#aaa;font-size:0.9rem;">Title</label>
        <input type="text" name="title" class="form-control mt-1"
          style="background:#2d2d44;border:1px solid #444;color:#fff;border-radius:8px;"
          placeholder="What's your question or topic?" required>
      </div>
      <div class="mb-3">
        <label style="color:#aaa;font-size:0.9rem;">Tag</label>
        <select name="tag" class="form-control mt-1"
          style="background:#2d2d44;border:1px solid #444;color:#fff;border-radius:8px;">
          <option value="Question">Question</option>
          <option value="Solution">Solution</option>
          <option value="Debug Help">Debug Help</option>
          <option value="Interviews">Interviews</option>
          <option value="General">General</option>
        </select>
      </div>
      <div class="mb-4">
        <label style="color:#aaa;font-size:0.9rem;">Body</label>
        <textarea name="body" rows="8" class="form-control mt-1"
          style="background:#2d2d44;border:1px solid #444;color:#fff;border-radius:8px;"
          placeholder="Describe your question, solution, or topic in detail..." required></textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn-arena btn px-4">Post</button>
        <a href="/discuss/" class="btn px-4" style="border:1px solid #444;color:#888;border-radius:20px;">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
