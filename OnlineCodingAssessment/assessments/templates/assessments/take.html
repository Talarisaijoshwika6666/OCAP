<!DOCTYPE html>
<html>
<head>
    <title>Take: {{ assessment.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>📝 {{ assessment.title }}</h2>
    <div class="alert alert-info">⏱ Duration: {{ assessment.duration }} minutes</div>
    <form method="POST">
        {% csrf_token %}
        {% for q in questions %}
        <div class="card mb-3 p-3">
            <p><strong>{{ forloop.counter }}. {{ q.text }}</strong></p>
            <div>
                <input type="radio" name="q{{ q.id }}" value="a"> A<br>
                <input type="radio" name="q{{ q.id }}" value="b"> B<br>
                <input type="radio" name="q{{ q.id }}" value="c"> C<br>
                <input type="radio" name="q{{ q.id }}" value="d"> D
            </div>
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">Submit Test</button>
    </form>
</div>
</body>
</html>
