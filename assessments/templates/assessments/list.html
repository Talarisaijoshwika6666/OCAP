{% extends 'base.html' %}
{% block page_title %}// Assessments{% endblock %}
{% block content %}
 
<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;">
  {% for a in assessments %}
  <div class="card-glass p-4 anim-in">
    <div style="font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:#b026ff;letter-spacing:2px;margin-bottom:8px;">// {{ a.difficulty }}</div>
    <h4 style="font-family:'Orbitron',monospace;font-weight:800;color:#f0eaff;margin-bottom:14px;">{{ a.title }}</h4>
    <div style="color:rgba(240,234,255,0.55);font-size:0.85rem;margin-bottom:6px;"><i class="fas fa-clock" style="color:#00fff7;width:18px;"></i> {{ a.duration }} minutes</div>
    <div style="color:rgba(240,234,255,0.55);font-size:0.85rem;margin-bottom:18px;"><i class="fas fa-star" style="color:#ffc107;width:18px;"></i> {{ a.total_marks }} marks</div>
    <a href="{% url 'assessment_detail' a.pk %}" class="btn-gradient" style="width:100%;justify-content:center;">Start Test</a>
  </div>
  {% empty %}
  <div class="card-glass p-5 anim-in" style="grid-column:1/-1;text-align:center;color:rgba(240,234,255,0.4);">
    <i class="fas fa-clipboard-list" style="font-size:2rem;display:block;margin-bottom:12px;opacity:0.3;"></i>
    <span style="font-family:'JetBrains Mono',monospace;font-size:0.85rem;">// no assessments available yet</span>
  </div>
  {% endfor %}
</div>
 
{% endblock %}
